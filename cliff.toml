[changelog]
header = "# Changelog\n\nAll notable changes to this project are documented in this file.\n"
body = """
{%- macro remote_url() -%}
  https://github.com/rjkaes/trueline-mcp
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}]({{ self::remote_url() }}/releases/tag/{{ version }}) — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | upper_first }}
  {% for commit in commits -%}
    - {{ commit.message | upper_first | trim }}\
      {% if commit.scope %} *({{ commit.scope }})*{% endif %}\
      {% if commit.breaking %} **BREAKING**{% endif %}
  {% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^feature", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^bugfix", group = "Bug Fixes" },
  { message = "^hotfix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^style", group = "Style" },
  { message = "^test", group = "Testing" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore: release", skip = true },
  { message = "^chore", group = "Miscellaneous" },
]
tag_pattern = "v[0-9].*"
sort_commits = "newest"
